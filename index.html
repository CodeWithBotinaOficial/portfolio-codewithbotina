<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />

    <!-- Preconnect for performance + SEO (faster LCP) -->
    <link rel="preconnect" href="https://cdn.contentful.com" />
    <link rel="preconnect" href="https://images.ctfassets.net" />
    <link rel="dns-prefetch" href="https://cdn.contentful.com" />
    <link rel="dns-prefetch" href="https://images.ctfassets.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Google Fonts: Plus Jakarta Sans (Headings) & Inter (Body) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      />
    </noscript>

    <!-- Base canonical — will be overridden by react-helmet-async per route -->
    <title>Diego Botina | Software Engineer & System Architect</title>
    <meta name="description" content="Portfolio of Diego Alejandro Botina — Software Engineer specializing in React, TypeScript and System Architecture." />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="0yf6XIr-f-43T2kmjPVNFiifEey14B7x8mzaH1he2z0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
